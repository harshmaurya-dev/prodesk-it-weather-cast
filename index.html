<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather-Cast</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="default-bg">

  <div class="container">

    <div class="header">
      <h1>🌤️ Weather-Cast</h1>
      <p class="subtitle">Check live weather for any city 🌍</p>
    </div>

    <!-- search -->
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Search any city..." />
      <button id="searchBtn">Search</button>
    </div>

    <!-- error -->
    <div id="errorBox" class="error-box" style="display:none;"></div>

    <!-- loading -->
    <div id="loadingBox" class="loading-box" style="display:none;">
      <div class="spinner"></div>
      <span>Fetching weather data...</span>
    </div>

    <!-- weather card -->
    <div id="weatherCard" class="weather-card" style="display:none;">

      <div class="card-top">
        <div class="city-name" id="cityName"></div>
        <div class="date-time" id="dateTime"></div>
      </div>

      <div class="card-middle">
        <img id="weatherIcon" src="" alt="weather icon" />
        <div class="temp-box">
          <div class="temperature" id="temperature"></div>
          <div class="condition" id="condition"></div>
        </div>
      </div>

      <div class="card-bottom">
        <div class="stat-box">
          <span class="stat-label">💧 Humidity</span>
          <span class="stat-value" id="humidity"></span>
        </div>
        <div class="stat-box">
          <span class="stat-label">💨 Wind</span>
          <span class="stat-value" id="windSpeed"></span>
        </div>
        <div class="stat-box">
          <span class="stat-label">🌡️ Feels Like</span>
          <span class="stat-value" id="feelsLike"></span>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
